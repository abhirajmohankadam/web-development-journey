<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Birthday Gift Site</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Happy+Monkey&display=swap" rel="stylesheet">
</head>
<body>
    <div class="header">
        <h1>Today is Robo's Birthday</h1>
        <img class="profile-image" src="images/robot.jpeg" alt="robo's face">
        <h2 id="bday-age">2 years old</h2>
        <h4 id="bday-date">13.03.2024</h4>
    </div>

    <div class="gift-section">
        <h2 class="gift-message">Here's how happy I am for you today 🥳</h2>
        <h3 class="gift-hint">(Hover over the gift)</h3>
        <div class="gift-image"></div>
    </div>
</body>
</html>
